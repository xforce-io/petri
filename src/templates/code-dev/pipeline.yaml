name: code-dev
description: |
  Issue → design → TDD develop → deterministic unit_test → agent review,
  iterating develop+test+review until review-approved.

stages:
  # 1. Issue: capture / normalize the requirement into artifacts
  - name: issue
    roles: [issue_analyst]
    max_retries: 2

  # 2. Design: architecture + test plan (gate design-complete)
  - name: design
    roles: [designer]
    max_retries: 2

  # 3–6. TDD develop → deterministic tests → review; iterate until approved
  - repeat:
      name: develop-review-cycle
      max_iterations: 5
      until: review-approved
      stages:
        # 3. TDD develop (playbook: tests first; self-report tests-pass)
        - name: develop
          roles: [developer]
          max_retries: 5

        # 4. Deterministic test stage (not agent self-report). The developer
        # works in its artifact directory, so run its actual Node/Python suite
        # there. Projects using another runner must replace this command.
        #
        # Multi-line command tips (issue #57): engine normalizes YAML fold /
        # more-indented argv into one shell script. Prefer if/then/fi or
        # && / ; for multi-statement scripts — see docs/safe-yaml-command.md.
        - name: unit_test
          command: >
            test_dir="$(dirname "{artifact_dir}")/develop/developer";
            if [ -f "$test_dir/package.json" ]; then
              (cd "$test_dir" && npm test) && printf '%s\n' '{"tests_passed":true,"runner":"npm test"}' > "{artifact_dir}/result.json";
            elif [ -f "$test_dir/pytest.ini" ] || [ -f "$test_dir/pyproject.toml" ] || [ -d "$test_dir/tests" ]; then
              (cd "$test_dir" && python -m pytest) && printf '%s\n' '{"tests_passed":true,"runner":"python -m pytest"}' > "{artifact_dir}/result.json";
            else
              echo "unit_test: no supported test runner found in $test_dir; configure unit_test.command for this project" >&2;
              exit 1;
            fi
          timeout: 600000
          gate:
            id: unit-tests-pass
            description: Deterministic unit tests must pass (command stage)
            evidence:
              path: "{stage}/result.json"
              check:
                field: tests_passed
                equals: true

        # 5. Review (uses the role's Provider, or the project default)
        - name: review
          roles: [code_reviewer]
          max_retries: 2
