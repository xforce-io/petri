# code-dev flow: whole-run AgentProvider is codex so review (and other roles)
# share the Codex CLI. Engine does not yet support per-role providers —
# see docs/design/42-code-dev-issue-tdd-codex-flow.md.
providers:
  default:
    type: codex

models:
  default:
    provider: default
    model: default

defaults:
  model: default
  gate_strategy: all
  max_retries: 3
