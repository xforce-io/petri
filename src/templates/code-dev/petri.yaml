# code-dev defaults to Grok. Code review uses the named Codex Provider below;
# other roles can opt in the same way with `provider` + `model` in role.yaml.
providers:
  default:
    type: grok
  codex_review:
    type: codex

models:
  default:
    provider: default
    model: default
  codex_review:
    provider: codex_review
    model: default

defaults:
  model: default
  gate_strategy: all
  max_retries: 3
