name: structured-debate
description: A structured debate between a proposer and opponent, judged by an impartial referee

goal: |
  Debate the topic: "AI will create more jobs than it destroys in the next decade."
  The proposer argues for, the opponent argues against, and the judge renders a verdict.

requirements:
  - verdict-rendered

stages:
  - name: opening
    roles: [proposer]
    max_retries: 2

  - name: rebuttal
    roles: [opponent]
    max_retries: 2

  - name: closing
    roles: [proposer]
    max_retries: 2

  - name: verdict
    roles: [judge]
    max_retries: 2
