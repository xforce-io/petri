name: structured-debate
description: A structured debate between a proposer and opponent, judged by an impartial referee

stages:
  - name: opening
    roles: [proposer]
    max_retries: 2

  - name: rebuttal
    roles: [opponent]
    max_retries: 2

  - name: closing
    roles: [proposer]
    max_retries: 2

  - name: verdict
    roles: [judge]
    max_retries: 2
